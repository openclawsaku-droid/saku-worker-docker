version: '3.8'

services:
  pu-chan:
    build: .
    container_name: pu-chan
    ports:
      - "8001:8001"
    volumes:
      - ./pu-chan:/workspace
      - ./shared/logs:/logs
    env_file: .env
    environment:
      - DISCORD_TOKEN=${PU_CHAN_DISCORD_TOKEN}
      - OPENCLAW_PORT=8001
      - AGENT_NAME=pu-chan
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "openclaw", "gateway", "health", "--token", "${OPENCLAW_GATEWAY_TOKEN:-}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  pino:
    build: .
    container_name: pino
    ports:
      - "8002:8002"
    volumes:
      - ./pino:/workspace
      - ./shared/logs:/logs
    env_file: .env
    environment:
      - DISCORD_TOKEN=${PINO_DISCORD_TOKEN}
      - OPENCLAW_PORT=8002
      - AGENT_NAME=pino
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "openclaw", "gateway", "health", "--token", "${OPENCLAW_GATEWAY_TOKEN:-}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
